spring.application.name=bookvault

# --- Web / server ---
server.port=8080

# --- H2 (in-memory) ---
spring.datasource.url=jdbc:h2:mem:bookvaultdb-${random.uuid};DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / schema ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Run `schema.sql` and `data.sql` on startup (and in tests).
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# --- JWT ---
bookvault.jwt.secret=dev-only-super-secret-dev-only-super-secret
bookvault.jwt.expiration=PT24H

# --- Async overdue scanning ---
bookvault.overdue.scan-cron=0 0 2 * * *

# --- Cache ---
spring.cache.type=CAFFEINE
